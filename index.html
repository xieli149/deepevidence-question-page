<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepEvidence 临床问题体验</title>
  <style>
    :root {
      color-scheme: light;
      --blue-900: #102a6b;
      --blue-800: #1742a0;
      --blue-600: #2563eb;
      --cyan-500: #18b6d9;
      --ink: #122033;
      --muted: #66758f;
      --line: #d9e2f0;
      --soft: #f4f8fc;
      --white: #ffffff;
      --shadow: 0 18px 50px rgba(23, 66, 160, .16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(24, 182, 217, .22), transparent 27%),
        linear-gradient(135deg, #eef6ff 0%, #f9fbfd 46%, #eaf8fb 100%);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 46px;
      height: 46px;
      place-items: center;
      border-radius: 12px;
      color: var(--white);
      background: linear-gradient(135deg, var(--blue-800), var(--cyan-500));
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 10px 25px rgba(37, 99, 235, .24);
    }

    .brand strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(37, 99, 235, .18);
      border-radius: 999px;
      color: var(--blue-800);
      background: rgba(255, 255, 255, .7);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(300px, .88fr);
      gap: 24px;
      align-items: start;
    }

    .generator,
    .qr-panel {
      border: 1px solid rgba(217, 226, 240, .86);
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: var(--shadow);
    }

    .generator {
      padding: 26px;
    }

    h1 {
      margin: 0;
      max-width: 740px;
      color: var(--blue-900);
      font-size: clamp(31px, 5vw, 54px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 24px 0 16px;
    }

    label {
      display: block;
      margin: 0 0 8px;
      color: #31405a;
      font-size: 13px;
      font-weight: 700;
    }

    select {
      width: 100%;
      height: 44px;
      padding: 0 38px 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--white);
      font-size: 15px;
      outline: none;
    }

    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(24, 182, 217, .28);
      outline-offset: 2px;
    }

    .question-box {
      position: relative;
      min-height: 168px;
      margin-top: 10px;
      padding: 22px;
      border: 1px solid #c9d8ea;
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      color: #24507d;
      background: #e9f5fb;
      font-size: 12px;
      font-weight: 700;
    }

    #questionText {
      margin: 0;
      font-size: 23px;
      line-height: 1.72;
      font-weight: 750;
      color: #14243a;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 750;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      color: var(--white);
      background: linear-gradient(135deg, var(--blue-800), var(--blue-600));
      box-shadow: 0 10px 20px rgba(37, 99, 235, .23);
    }

    .manual-steps {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      color: #4d5d77;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.6;
    }

    .qr-panel {
      overflow: hidden;
    }

    .qr-head {
      padding: 24px 24px 0;
    }

    .qr-head h2 {
      margin: 0;
      color: var(--blue-900);
      font-size: 24px;
      line-height: 1.25;
    }

    .qr-head p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.65;
    }

    .qr-frame {
      margin: 20px 24px 24px;
      padding: 14px;
      border-radius: 8px;
      background: linear-gradient(135deg, #184db7, #2b7af7);
    }

    .qr-frame img {
      display: block;
      width: 100%;
      border-radius: 6px;
    }

    @media (max-width: 860px) {
      .page {
        width: min(100% - 22px, 680px);
        padding-top: 18px;
      }

      .topbar {
        align-items: flex-start;
      }

      .badge {
        display: none;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .generator {
        padding: 20px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      #questionText {
        font-size: 20px;
      }

      .question-box {
        min-height: 150px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand" aria-label="DeepEvidence">
        <div class="brand-mark">DE</div>
        <div>
          <strong>DeepEvidence</strong>
          <span>AI 循证医学检索系统</span>
        </div>
      </div>
      <div class="badge">临床问题启发 · 扫码进入体验</div>
    </header>

    <section class="layout">
      <div class="generator">
        <h1>不知道问什么？先从一个临床问题开始</h1>

        <div class="controls" aria-label="问题筛选">
          <div>
            <label for="department">临床方向</label>
            <select id="department">
              <option value="all">全部方向</option>
              <option value="心血管">心血管</option>
              <option value="肿瘤">肿瘤</option>
              <option value="呼吸">呼吸</option>
              <option value="内分泌">内分泌</option>
              <option value="感染">感染</option>
              <option value="消化">消化</option>
              <option value="神经">神经</option>
              <option value="围术期">围术期</option>
            </select>
          </div>
          <div>
            <label for="scenario">问题类型</label>
            <select id="scenario">
              <option value="all">全部类型</option>
              <option value="诊断">诊断与鉴别</option>
              <option value="治疗">治疗方案</option>
              <option value="用药">用药选择</option>
              <option value="指南">指南证据</option>
              <option value="预后">预后评估</option>
            </select>
          </div>
        </div>

        <article class="question-box" aria-live="polite">
          <div class="question-meta">
            <span class="tag" id="deptTag">心血管</span>
            <span class="tag" id="typeTag">治疗方案</span>
          </div>
          <p id="questionText"></p>
        </article>

        <div class="actions">
          <button class="primary" id="generateBtn" type="button" aria-label="生成新的临床问题">换一个问题</button>
        </div>

        <div class="manual-steps" aria-label="体验步骤">
          <div>1.第一步：浏览问题，寻找启发</div>
          <div>2.第二步：结合临床，提出你自己的问题</div>
          <div>3.第三步：扫码进入，手动输入你的问题</div>
        </div>
      </div>

      <aside class="qr-panel" aria-label="扫码进入 DeepEvidence">
        <div class="qr-head">
          <h2>扫码进入产品，提问</h2>
          <p>进入 DeepEvidence 后，手动输入你的问题，即可开始体验。</p>
        </div>
        <div class="qr-frame">
          <img src="assets/deepevidence-qr-crop.jpg" alt="DeepEvidence 体验二维码">
        </div>
      </aside>
    </section>
  </main>

    function randomIndex(length) {
      if (window.crypto && window.crypto.getRandomValues) {
        const values = new Uint32Array(1);
        window.crypto.getRandomValues(values);
        return values[0] % length;
      }
      return Math.floor(Math.random() * length);
    }

    function pick(list) {
      const index = randomIndex(list.length);
      return { value: list[index], index };
    }

    function loadUsedQuestionKeys() {
      try {
        return new Set(JSON.parse(localStorage.getItem(storageKey) || "[]"));
      } catch (error) {
        return new Set();
      }
    }

    function saveUsedQuestionKeys() {
      try {
        const latestKeys = Array.from(usedQuestionKeys).slice(-6000);
        localStorage.setItem(storageKey, JSON.stringify(latestKeys));
      } catch (error) {
        return;
      }
    }

    function hashText(text) {
      let hash = 2166136261;
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(36);
    }

    function buildQuestion() {
      const departmentNames = Object.keys(departments);
      const departmentPick = departmentSelect.value === "all"
        ? pick(departmentNames)
        : { value: departmentSelect.value, index: departmentNames.indexOf(departmentSelect.value) };
      const department = departmentPick.value;
      const topicPick = pick(departments[department]);
      const typePick = scenarioSelect.value === "all"
        ? pick(questionTypes)
        : { value: scenarioSelect.value, index: questionTypes.indexOf(scenarioSelect.value) };
      const type = typePick.value;
      const templatePick = pick(questionTemplates[type]);
      const markerPick = pick(patientMarkers);
      const contextPick = pick(contextMarkers);
      const focusPick = pick(conciseFocuses[type]);
      const text = templatePick.value({
        marker: markerPick.value,
        topic: topicPick.value,
        context: contextPick.value,
        focus: focusPick.value
      });

      return { key: hashText(text), department, type, text };
    }

      for (
        let attempts = 0;
        attempts < 200 && (question.text.length > maxQuestionLength || usedQuestionKeys.has(question.key) || question.key === lastQuestionKey);
        attempts += 1
      ) {
        question = buildQuestion();
      }
      lastQuestionKey = question.key;
      usedQuestionKeys.add(question.key);
      saveUsedQuestionKeys();
      renderQuestion(question);
    }

    generateBtn.addEventListener("click", generateQuestion);
    departmentSelect.addEventListener("change", generateQuestion);
    scenarioSelect.addEventListener("change", generateQuestion);

    generateQuestion();
  </script>
</body>
</html>
